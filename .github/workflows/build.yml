name: Build/release

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    environment: build
    env:
      FLAND_UPDATE_REPOSITORY: ${{ github.repository }}
      VITE_MULTIPLAYER_DEFAULT_SUPABASE_URL: ${{ vars.VITE_MULTIPLAYER_DEFAULT_SUPABASE_URL }}
      VITE_MULTIPLAYER_DEFAULT_SUPABASE_ANON_KEY: ${{ vars.VITE_MULTIPLAYER_DEFAULT_SUPABASE_ANON_KEY }}
      VITE_MULTIPLAYER_DEVELOPMENT_SUPABASE_URL: ${{ vars.VITE_MULTIPLAYER_DEVELOPMENT_SUPABASE_URL }}
      VITE_MULTIPLAYER_DEVELOPMENT_SUPABASE_ANON_KEY: ${{ vars.VITE_MULTIPLAYER_DEVELOPMENT_SUPABASE_ANON_KEY }}
      VITE_GAME_ENV: ${{ vars.VITE_GAME_ENV }}
      FLAND_BUILD_PROFILE: ${{ vars.FLAND_BUILD_PROFILE }}
      FLAND_BUILD_ANALYZE: ${{ vars.FLAND_BUILD_ANALYZE }}
      FLAND_OBFUSCATE_RENDERER: ${{ vars.FLAND_OBFUSCATE_RENDERER }}
      FLAND_OBFUSCATE_PRELOAD: ${{ vars.FLAND_OBFUSCATE_PRELOAD }}
      FLAND_OBFUSCATE_MAIN: ${{ vars.FLAND_OBFUSCATE_MAIN }}
      FLAND_ENABLE_DEV_FEATURES: ${{ vars.FLAND_ENABLE_DEV_FEATURES }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh yt-dlp to latest release
        run: npm run prepare:ytdlp:latest

      - name: Build app
        run: npm run build

      - name: Package Electron app
        run: npx electron-builder --publish never

      - name: Publish GitHub release assets
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
